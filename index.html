<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cryptext Mirror Pro</title>
    <link rel="stylesheet" href="style.css?v=1.4">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="main-wrapper">
        <div class="result-viewport">
            <div id="resultado" class="fuente-custom"></div>
        </div>

        <div class="input-footer">
            <input type="text" id="inputTexto" placeholder="Escribe..." autocomplete="off" autofocus>
        </div>
    </div>

    <script>
        const input = document.getElementById('inputTexto');
        const resultado = document.getElementById('resultado');

        input.addEventListener('input', () => {
            // El CSS maneja el espejo con scaleX(-1)
            resultado.textContent = input.value;
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
